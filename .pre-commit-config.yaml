repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: just-lint
        name: Run all linters (Vue & Rust)
        entry: just lint
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: check-security
        name: Run dependecies security check
        entry: just check-security
        language: system
        pass_filenames: false
